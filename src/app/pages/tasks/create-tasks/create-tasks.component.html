<ion-header>
  <ion-toolbar>
    <ion-title>{{task.id ? 'Editar tarea' : 'Nueva tarea'}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input labelPlacement="floating" label="título* :" [(ngModel)]="task.title"
        placeholder="Ingrese un título para la tarea"></ion-input>
    </ion-item>
    <ion-item>
      <ion-textarea labelPlacement="floating" label="descripción* :" [(ngModel)]="task.description"
        placeholder="Ingrese la descripción de la tarea"></ion-textarea>
    </ion-item>
    <ion-item>
      <ion-label>Categoría* :</ion-label>
      <ion-select placeholder="Seleccione una categoría" [(ngModel)]="task.categoryId">
        <ion-select-option *ngFor="let category of categories$ | async" [value]="category.id">
          {{ category.name }}
        </ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-datetime presentation="date-time" labelPlacement="floating" label="Fecha de vencimiento"
        displayFormat="DD/MM/YYYY" [(ngModel)]="task.dueDate"></ion-datetime>
    </ion-item>
  </ion-list>
  <ion-button expand="block" (click)="cancel()" color="danger">Cancelar</ion-button>
  <ion-button expand="block" (click)="task.id ? updateTask() : createTask()" [disabled]="!validateForm()">
    {{task.id ? 'Actualizar tarea' : 'Crear tarea'}}
  </ion-button>
</ion-content>
