<ion-list>
  @for (task of tasks$ | async; track $index) {
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ task.title }}</ion-card-title>
      <ion-card-subtitle>{{ task.dueDate | date }}</ion-card-subtitle>
      @if (task.categoryId) {
      <ion-item>
        <ion-icon aria-hidden="true" name="ellipse" size="small"></ion-icon>
        <ion-label>{{task.categoryId}}</ion-label>
      </ion-item>
      }
    </ion-card-header>

    <ion-card-content>
      @if (task.description) {
      <p>
        {{ task.description }}
      </p>
      }
      @if (task.dueDate) {
      <p>
        vence el: {{ task.dueDate | date }}
      </p>
      }
    </ion-card-content>
    <ion-button size="default" fill="clear" color="danger" (click)="showAlert(task.id)">
      <ion-icon slot="start" name="trash-outline"></ion-icon>
      Eliminar
    </ion-button>
    <ion-button size="default" fill="clear" (click)="toggleTask(task.id)">
      <ion-icon slot="start" name="checkmark-outline"></ion-icon>
      Completada
    </ion-button>
  </ion-card>
  }
</ion-list>
<ion-infinite-scroll (ionInfinite)="onIonInfinite($event)">
  <ion-infinite-scroll-content></ion-infinite-scroll-content>
</ion-infinite-scroll>
<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button (click)="openAddTask()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
